name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: lint + types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uvx --with tox-uv tox -e checks

  test:
    name: test (${{ matrix.toxenv }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toxenv: [py310, py311, py312, py313]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uvx --with tox-uv tox -e ${{ matrix.toxenv }}