name: CI

on:
  push:
    branches: [main]
    tags: ['[0-9]+.[0-9]+.[0-9]+*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: lint + types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uvx --with tox-uv tox -e checks

  test:
    name: test (${{ matrix.toxenv }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toxenv: [py310, py311, py312, py313]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uvx --with tox-uv tox -e ${{ matrix.toxenv }}

  publish:
    name: publish release
    needs: [checks, test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the GitHub release
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs derives the version from the tag
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # Extract notes first: a missing changelog section aborts before publishing.
      - run: python scripts/extract_changelog.py "$GITHUB_REF_NAME" /tmp/release-notes.txt
      - run: uv build
      # --check-url lets a re-run skip files already on PyPI instead of failing.
      - run: uv publish --token "${{ secrets.PYPI_API_TOKEN }}" --check-url https://pypi.org/simple/unclogger/
      - name: Create or update the GitHub release
        run: |
          PRERELEASE=""
          if [[ "$GITHUB_REF_NAME" =~ (a|b|rc)[0-9]+$ ]]; then PRERELEASE="--prerelease"; fi
          if gh release view "$GITHUB_REF_NAME" --repo berislavlopac/unclogger >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --repo berislavlopac/unclogger --notes-file /tmp/release-notes.txt $PRERELEASE
          else
            gh release create "$GITHUB_REF_NAME" --repo berislavlopac/unclogger --notes-file /tmp/release-notes.txt $PRERELEASE
          fi